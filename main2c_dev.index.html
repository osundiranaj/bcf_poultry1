<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Navigator • Icon Sidebar</title>
  
  <!-- Bootstrap 5 CSS & JS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet"/>
  
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #764ba2;
      --bg-light: #f8fafc;
      --sidebar-width: 72px;
      --header-height: 120px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; }
    body {
      height: 100vh; margin: 0; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #1e293b;
    }

    /* Header */
    .top-header {
      height: var(--header-height); background: white; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem;
      position: relative; z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-badge { background: var(--primary); color: white; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
    .brand h1 { font-size: 1.25rem; font-weight: 700; margin: 0; }
    
    .countdown {
      background: #f8fafc; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 10px;
      display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 500;
    }
    .cd-block { display: flex; flex-direction: column; align-items: center; line-height: 1; }
    .cd-block span { font-weight: 700; font-size: 0.95rem; color: var(--primary); }
    .cd-block small { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }

    /* Workspace */
    .workspace { display: flex; height: calc(100vh - var(--header-height)); }
    
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width); background: white;
      border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center;
      padding-top: 1.5rem; gap: 12px; overflow-y: auto; transition: var(--transition);
    }
    .sidebar.hidden { width: 0; min-width: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }
    
    .nav-btn {
      width: 48px; height: 48px; border: none; border-radius: 14px; background: #f8fafc;
      color: #64748b; font-size: 1.35rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: var(--transition);
      position: relative;
    }
    .nav-btn:hover { background: #e2e8f0; color: var(--primary-dark); transform: scale(1.05); }
    .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 6px 16px rgba(102,126,234,0.35); }
    .nav-btn.active::after {
      content: ''; position: absolute; right: -12px; top: 50%; transform: translateY(-50%);
      width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent;
      border-left: 8px solid var(--primary);
    }
    .nav-btn[title] { position: relative; }
    
    /* Main View */
    .main-view { flex: 1; position: relative; background: white; }
    iframe { width: 100%; height: 100%; border: none; background: white; }
    .placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #94a3b8; text-align: center; padding: 2rem;
    }
    .loader {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: none;
    }
    
    /* Modal Tweaks */
    .modal-content { border-radius: 16px; border: none; }
    .btn-wl { background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: 600; }
    .btn-wl:hover { background: var(--primary-dark); color: white; }
    
    @media (max-width: 768px) {
      .countdown { display: none; }
      .sidebar { position: absolute; z-index: 30; height: 100%; box-shadow: 4px 0 20px rgba(0,0,0,0.1); }
      .sidebar.hidden { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="top-header">
    <div class="brand">
      <span class="brand-badge" id="version-tag">v1.0</span>
      <h1 id="project-title">Project Navigator</h1>
    </div>
    <div class="d-flex align-items-center gap-3">
      <div class="countdown">
        <span>Launch In:</span>
        <div class="cd-block"><span id="cd-d">00</span><small>D</small></div>
        <div class="cd-block"><span id="cd-h">00</span><small>H</small></div>
        <div class="cd-block"><span id="cd-m">00</span><small>M</small></div>
        <div class="cd-block"><span id="cd-s">00</span><small>S</small></div>
      </div>
      <button class="btn btn-wl px-3 py-2" data-bs-toggle="modal" data-bs-target="#wlModal">
        <i class="bi bi-envelope-plus me-2"></i>Join Waitlist
      </button>

      <button class="btn btn-wl px-3 py-2"  onclick="window.location.href='index.html'">
        <i class="bi bi-envelope-plus me-2"></i>Back
      </button>

    </div>
  </header>

  <!-- Workspace -->
  <div class="workspace">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-view">
      <div id="placeholder" class="placeholder">
        <i class="bi bi-cursor display-1 mb-3" style="opacity:0.4"></i>
        <h4 class="mb-1">Select a Page</h4>
        <p class="text-muted small mb-0">Click an icon on the left to load the content</p>
      </div>
      <div class="loader text-center">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
      </div>
      <iframe id="viewer" style="display:none;"></iframe>
    </main>
  </div>

  <!-- Waitlist Modal -->
  <div class="modal fade" id="wlModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-0 overflow-hidden">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title"><i class="bi bi-bell text-primary me-2"></i>Get Early Access</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4 pb-4">
          <form id="wlForm">
            <input type="text" class="form-control mb-2" placeholder="Full Name" required>
            <input type="email" class="form-control mb-3" placeholder="Email Address" required>
            <button type="submit" class="btn btn-wl w-100 py-2">Reserve My Spot</button>
            <div id="wlSuccess" class="alert alert-success mt-3 d-none small mb-0">✅ You're on the list!</div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  


  <!--     BOOTSTRAP        ICONS REFERENCE (40 Most Useful)
    
    Format: <i class="bi bi-icon-name"></i>

        NAVIGATION & UI:
        1.  <i class="bi bi-house"></i>                 Home
        2.  <i class="bi bi-speedometer2"></i>          Dashboard
        3.  <i class="bi bi-grid"></i>                  Grid/Menu
        4.  <i class="bi bi-list"></i>                  List
        5.  <i class="bi bi-gear"></i>                  Settings
        6.  <i class="bi bi-sliders"></i>               Controls/Filters
        7.  <i class="bi bi-search"></i>                Search
        8.  <i class="bi bi-bell"></i>                  Notifications
        9.  <i class="bi bi-bookmark"></i>              Bookmark
        10. <i class="bi bi-star"></i>                  Favorite

        FILES & DOCUMENTS:
        11. <i class="bi bi-file-earmark"></i>          Generic File
        12. <i class="bi bi-file-earmark-text"></i>     Text File
        13. <i class="bi bi-file-earmark-pdf"></i>      PDF
        14. <i class="bi bi-file-earmark-image"></i>    Image
        15. <i class="bi bi-folder"></i>                Folder
        16. <i class="bi bi-folder-open"></i>           Open Folder
        17. <i class="bi bi-file-earmark-bar-graph"></i> Report/Chart
        18. <i class="bi bi-clipboard"></i>             Clipboard
        19. <i class="bi bi-archive"></i>               Archive
        20. <i class="bi bi-download"></i>              Download

        USERS & COMMUNICATION:
        21. <i class="bi bi-person"></i>                User Profile
        22. <i class="bi bi-people"></i>                Users/Team
        23. <i class="bi bi-person-plus"></i>           Add User
        24. <i class="bi bi-envelope"></i>              Email
        25. <i class="bi bi-chat-dots"></i>             Chat/Messages
        26. <i class="bi bi-chat-left-text"></i>        Comment
        27. <i class="bi bi-question-circle"></i>       Help/FAQ
        28. <i class="bi bi-info-circle"></i>           Info
        29. <i class="bi bi-exclamation-triangle"></i>  Warning
        30. <i class="bi bi-check-circle"></i>          Success/Verified

        ACTIONS & EDITING:
        31. <i class="bi bi-plus-lg"></i>               Add/Create
        32. <i class="bi bi-pencil"></i>                Edit
        33. <i class="bi bi-trash"></i>                 Delete
        34. <i class="bi bi-pencil-square"></i>         Write/Compose
        35. <i class="bi bi-upload"></i>                Upload
        36. <i class="bi bi-share"></i>                 Share
        37. <i class="bi bi-link-45deg"></i>            Link
        38. <i class="bi bi-copy"></i>                  Copy
        39. <i class="bi bi-printer"></i>               Print
        40. <i class="bi bi-box-arrow-right"></i>       Logout

      FULL ICON LIBRARY: https://icons.getbootstrap.com
  -->

  <script>
    // =========================================================
    // ⚙️ CONFIGURATION (EDIT ONLY THIS SECTION)
    // =========================================================
    const SHOW_SIDEBAR = true; // ← Set to false to hide icon navigation entirely
    
    const CONFIG = {
      title: "Project Navigator",
      version: "v1.0",
      launchDate: "2026-05-15T09:00:00", // YYYY-MM-DDTHH:MM:SS
      pages: [
        { href: "index_test.html", icon: "bi-speedometer2" },
        { href: "2_bookings.html",   icon: "bi-file-earmark-bar-graph" },
        { href: "2_event.html",     icon: "bi-people" },
        { href: "2_userGuide.html",  icon: "bi-gear" }
        // ,
        // { href: "#",      icon: "bi-question-circle" },
        // { href: "#",      icon: "bi-question-circle" },
        // { href: "#",      icon: "bi-question-circle" },
        // { href: "#",      icon: "bi-question-circle" },
        // { href: "#",  icon: "bi-question-circle" }
      ]
    };
    // =========================================================


    // 1. Apply Config to Header
    document.getElementById('project-title').textContent = CONFIG.title;
    document.getElementById('version-tag').textContent = CONFIG.version;

    // 2. Countdown Logic
    const cdEls = { d: document.getElementById('cd-d'), h: document.getElementById('cd-h'), m: document.getElementById('cd-m'), s: document.getElementById('cd-s') };
    function tick() {
      const diff = new Date(CONFIG.launchDate) - Date.now();
      if (diff <= 0) {
        document.querySelector('.countdown').innerHTML = '<span class="text-success fw-bold">🚀 Live Now</span>';
        return;
      }
      cdEls.d.textContent = String(Math.floor(diff/864e5)).padStart(2,'0');
      cdEls.h.textContent = String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
      cdEls.m.textContent = String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
      cdEls.s.textContent = String(Math.floor((diff%6e4)/1e3)).padStart(2,'0');
    }
    tick(); setInterval(tick, 1000);

    // 3. Render Sidebar Icons
    const sidebar = document.getElementById('sidebar');
    const viewer = document.getElementById('viewer');
    const placeholder = document.getElementById('placeholder');
    const loader = document.querySelector('.loader');

    if (!SHOW_SIDEBAR) sidebar.classList.add('hidden');

    CONFIG.pages.forEach((page, i) => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn';
      btn.title = page.href.replace('.html','').replace('-',' '); // Tooltip
      btn.innerHTML = `<i class="bi ${page.icon}"></i>`;
      btn.onclick = () => loadPage(page.href, btn);
      sidebar.appendChild(btn);
    });

    // 4. Page Loader
    let activeBtn = null;
    function loadPage(url, btn) {
      if (activeBtn) activeBtn.classList.remove('active');
      btn.classList.add('active');
      activeBtn = btn;

      placeholder.style.display = 'none';
      viewer.style.display = 'none';
      loader.style.display = 'block';

      viewer.onload = () => {
        loader.style.display = 'none';
        viewer.style.display = 'block';
      };
      viewer.src = url;
    }

    // 5. Waitlist Form
    document.getElementById('wlForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const success = document.getElementById('wlSuccess');
      btn.disabled = true; btn.innerHTML = '⏳ Processing...';
      setTimeout(() => {
        btn.innerHTML = '✅ Done'; btn.classList.replace('btn-wl','btn-success');
        success.classList.remove('d-none');
        setTimeout(() => {
          bootstrap.Modal.getInstance(document.getElementById('wlModal')).hide();
          setTimeout(() => { e.target.reset(); btn.disabled=false; btn.innerHTML='Reserve My Spot'; btn.classList.replace('btn-success','btn-wl'); success.classList.add('d-none'); }, 300);
        }, 1500);
      }, 1200);
    });
  </script>
</body>
</html>
